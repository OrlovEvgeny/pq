name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../pq-${{ github.ref_name }}-${{ matrix.target }}.tar.gz pq
          cd ../../..
          shasum -a 256 pq-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > pq-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/pq.exe" -DestinationPath "pq-${{ github.ref_name }}-${{ matrix.target }}.zip"
          (Get-FileHash "pq-${{ github.ref_name }}-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower() + "  pq-${{ github.ref_name }}-${{ matrix.target }}.zip" | Out-File "pq-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256" -Encoding ascii

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pq-${{ matrix.target }}
          path: |
            pq-*.tar.gz
            pq-*.tar.gz.sha256
            pq-*.zip
            pq-*.zip.sha256

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          pip install --user git-cliff || pipx install git-cliff || cargo install git-cliff
          git cliff --latest --strip header > RELEASE_NOTES.md

          cat >> RELEASE_NOTES.md << 'INSTALL'

          ## Install

          ```bash
          # Homebrew (macOS / Linux)
          brew install OrlovEvgeny/pq/pq

          # Shell
          curl -sSf https://pq.eorlov.org/install.sh | bash

          # Cargo
          cargo install pq-parquet

          # Pre-built binary (no compile)
          cargo binstall pq-parquet
          ```
          INSTALL

          sed -i 's/^          //' RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/*
          generate_release_notes: false

  upload-r2:
    name: Upload to R2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload binaries to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Upload versioned artifacts
          aws s3 cp artifacts/ "s3://${R2_BUCKET}/dist/${TAG}/" \
            --recursive \
            --endpoint-url "${R2_ENDPOINT}" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Generate and upload latest.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://pq.eorlov.org/dist/${TAG}"

          TARGETS=("x86_64-apple-darwin" "aarch64-apple-darwin" "x86_64-unknown-linux-gnu" "aarch64-unknown-linux-gnu" "x86_64-pc-windows-msvc")

          JSON='{"version":"'"${TAG}"'","date":"'"${DATE}"'","assets":{'
          first=true
          for target in "${TARGETS[@]}"; do
            if [[ "$target" == *"windows"* ]]; then
              ext="zip"
            else
              ext="tar.gz"
            fi
            file="pq-${TAG}-${target}.${ext}"
            sha=$(awk '{print $1}' "artifacts/${file}.sha256")
            url="${BASE_URL}/${file}"

            if [ "$first" = true ]; then
              first=false
            else
              JSON="${JSON},"
            fi
            JSON="${JSON}\"${target}\":{\"url\":\"${url}\",\"sha256\":\"${sha}\",\"format\":\"${ext}\"}"
          done
          JSON="${JSON}}}"

          echo "$JSON" | python3 -m json.tool > latest.json
          cat latest.json

          aws s3 cp latest.json "s3://${R2_BUCKET}/dist/latest.json" \
            --endpoint-url "${R2_ENDPOINT}" \
            --cache-control "public, max-age=300" \
            --content-type "application/json"

      - name: Upload install.sh to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          aws s3 cp install.sh "s3://${R2_BUCKET}/install.sh" \
            --endpoint-url "${R2_ENDPOINT}" \
            --cache-control "public, max-age=3600" \
            --content-type "text/plain"

  homebrew:
    name: Update Homebrew Formula
    needs: [release, upload-r2]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          SHA_DARWIN_ARM64=$(awk '{print $1}' artifacts/pq-${TAG}-aarch64-apple-darwin.tar.gz.sha256)
          SHA_DARWIN_X86=$(awk '{print $1}' artifacts/pq-${TAG}-x86_64-apple-darwin.tar.gz.sha256)
          SHA_LINUX_ARM64=$(awk '{print $1}' artifacts/pq-${TAG}-aarch64-unknown-linux-gnu.tar.gz.sha256)
          SHA_LINUX_X86=$(awk '{print $1}' artifacts/pq-${TAG}-x86_64-unknown-linux-gnu.tar.gz.sha256)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/OrlovEvgeny/homebrew-pq.git" tap
          cd tap

          cat > Formula/pq.rb << FORMULA
          class Pq < Formula
            desc "The Swiss Army knife of Parquet. Inspect, transform, and operate on Parquet files from your terminal"
            homepage "https://github.com/OrlovEvgeny/pq"
            license "MIT"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://pq.eorlov.org/dist/${TAG}/pq-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://pq.eorlov.org/dist/${TAG}/pq-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_X86}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://pq.eorlov.org/dist/${TAG}/pq-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://pq.eorlov.org/dist/${TAG}/pq-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              bin.install "pq"
            end

            test do
              assert_match "pq #{version}", shell_output("#{bin}/pq --version")
            end
          end
          FORMULA

          sed -i 's/^          //' Formula/pq.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pq.rb
          git commit -m "pq ${TAG}"
          git push
